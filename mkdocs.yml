site_name: Orchestra Documentation
site_description: Python-first multi-agent orchestration framework
site_url: https://orchestra-agents.dev
repo_url: https://github.com/orchestra-agents/orchestra
repo_name: orchestra-agents/orchestra

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_bases: true
            heading_level: 3
            members_order: source
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - toc:
      permalink: true
  - attr_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Agents: concepts/agents.md
      - Graphs: concepts/graphs.md
      - State & Reducers: concepts/state.md
      - Testing: concepts/testing.md
  - API Reference:
      - Core: api/core.md
      - Providers: api/providers.md
      - Tools: api/tools.md
      - Testing: api/testing.md
      - CLI: api/cli.md
      - Observability: api/observability.md

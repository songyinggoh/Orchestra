# NATS Helm chart values — 3-node JetStream cluster with file storage.
# Chart: nats/nats >= 1.1.0
# Install: helm repo add nats https://nats-io.github.io/k8s/helm/charts/
#          helm install nats nats/nats -n orchestra -f deploy/nats-values.yaml

config:
  cluster:
    enabled: true
    replicas: 3
    name: orchestra-nats

  jetstream:
    enabled: true
    fileStore:
      enabled: true
      dir: /data/jetstream
      pvc:
        enabled: true
        size: 10Gi
        storageClassName: ""  # Use cluster default (gp3 on EKS, pd-ssd on GKE)
    memoryStore:
      enabled: false

container:
  image:
    repository: nats
    tag: "2.10-alpine"
    pullPolicy: IfNotPresent
  env:
    # Increase max payload to match stream max_msg_size (1 MB)
    - name: NATS_MAX_PAYLOAD
      value: "1048576"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

# Expose monitoring port 8222 — required for KEDA NATS JetStream scaler
service:
  ports:
    monitor:
      enabled: true
      port: 8222

# Prevent single node from taking down the cluster during rolling updates
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# Reload server config without restarts
reloader:
  enabled: true

# Disable nats-box debug container in production
natsBox:
  enabled: false

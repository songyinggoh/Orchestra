apiVersion: v1
kind: Service
metadata:
  name: {{ include "orchestra.fullname" . }}
  labels: {{- include "orchestra.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector: {{- include "orchestra.selectorLabels" . | nindent 4 }}

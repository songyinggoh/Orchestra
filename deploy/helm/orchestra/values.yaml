replicaCount: 2

image:
  repository: ghcr.io/songyinggoh/orchestra
  tag: ""  # Defaults to Chart.appVersion
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# Set to "gvisor" or "kata" for sandboxed agent pods (T-4.2).
# Leave empty for standard runc runtime.
runtime:
  className: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

nats:
  enabled: true
  url: "nats://orchestra-nats:4222"
  jetstream:
    enabled: true
    fileStorage:
      size: 10Gi

keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 20
  # Scale 1 replica per 100 pending messages
  lagThreshold: "100"
  # Activate from 0 replicas when lag > 10
  activationLagThreshold: "10"

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
  startup:
    path: /healthz
    failureThreshold: 30
    periodSeconds: 5

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0  # Zero-downtime rolling deploys

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Tolerations for agent-only node taint
tolerations: []

nodeSelector: {}

affinity: {}

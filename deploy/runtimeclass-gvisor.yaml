# gVisor RuntimeClass — GKE native (sandbox_config) or EKS with DaemonSet installer.
# Apply: kubectl apply -f deploy/runtimeclass-gvisor.yaml
# Usage: set spec.runtimeClassName: gvisor in Pod spec (or values-prod.yaml runtime.className)
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
overhead:
  podFixed:
    memory: "64Mi"
    cpu: "50m"
scheduling:
  nodeSelector:
    orchestra.dev/sandbox: "gvisor"

# Kata Containers RuntimeClass — hardware VM isolation (EKS bare-metal or on-prem).
# GKE does not natively support Kata; use gVisor (runtimeclass-gvisor.yaml) on GKE.
# Apply: kubectl apply -f deploy/runtimeclass-kata.yaml
# Usage: set spec.runtimeClassName: kata in Pod spec for maximum isolation
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata
# kata-qemu uses QEMU hypervisor; kata-fc uses Firecracker (faster, less compatible)
handler: kata-qemu
overhead:
  podFixed:
    memory: "128Mi"
    cpu: "100m"
scheduling:
  nodeSelector:
    orchestra.dev/sandbox: "kata"

name: CD (Helm & KinD)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  helm-test:
    name: Helm Integration Test (KinD)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (lint)
        run: ct lint --target-branch main --chart-dirs deploy/helm/

      - name: Create KinD cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: orchestra-kind

      - name: Build Docker image for worker
        run: |
          docker build -t orchestra-agents/worker:latest .

      - name: Load image into KinD
        run: |
          kind load docker-image orchestra-agents/worker:latest --name orchestra-kind

      - name: Run chart-testing (install)
        run: ct install --target-branch main --chart-dirs deploy/helm/ --namespace orchestra-test

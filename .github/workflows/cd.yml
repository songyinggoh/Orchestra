name: CD (Helm & KinD)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: Unit Tests (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev,server,telemetry,cache,storage,postgres,nats,security,memory,routing]"
      - name: Run unit tests
        run: pytest tests/unit/ -x -q

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # required by ct to detect changed charts

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (lint)
        run: ct lint --target-branch master --chart-dirs deploy/helm/

  helm-install:
    name: Helm Install (KinD)
    # Only deploy on push to master — not on every PR
    if: github.event_name == 'push'
    needs: [helm-lint, unit-test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # required by ct to detect changed charts

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create KinD cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: orchestra-kind

      - name: Build Docker image for worker
        run: |
          docker build -t orchestra-agents/worker:latest .

      - name: Load image into KinD
        run: |
          kind load docker-image orchestra-agents/worker:latest --name orchestra-kind

      - name: Run chart-testing (install)
        run: ct install --target-branch master --chart-dirs deploy/helm/ --namespace orchestra-test

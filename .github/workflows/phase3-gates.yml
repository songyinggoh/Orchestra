name: Phase 3 Quality Gates

on:
  push:
    branches: [phase3-production-readiness, master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "nc -z 127.0.0.1 4222"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,server,storage,security,messaging,memory,routing,telemetry,cache]"
      - name: Run unit tests with coverage
        env:
          NATS_URL: "nats://localhost:4222"
        run: |
          python -m pytest tests/unit/ tests/integration/ tests/security/ \
            --cov=orchestra \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -q

  chaos-tests:
    name: Chaos Engineering Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,server,storage,security,messaging,memory,routing,telemetry,cache]"
      - name: Run chaos tests
        run: python -m pytest tests/chaos/ -v

  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,server,storage,security,messaging,memory,routing,telemetry,cache,test-advanced]"
      - name: Run property tests
        run: python -m pytest tests/property/ -v
